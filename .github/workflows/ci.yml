name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with Python
      run: |
        # Check syntax
        python -m py_compile src/task.py
        python -m py_compile src/storage.py
        python -m py_compile todo.py

    - name: Test CLI commands
      run: |
        # Test that CLI runs without errors
        python todo.py --help
        python todo.py add "Test task"
        python todo.py list
        python todo.py complete 1
        python todo.py delete 1

    - name: Run tests (if available)
      run: |
        if [ -d "tests" ]; then
          pip install pytest pytest-cov
          pytest tests/ -v --cov=src --cov-report=term-missing
        else
          echo "No tests directory found, skipping"
        fi

  docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t todo-cli:test .

    - name: Test Docker image
      run: |
        docker run --rm todo-cli:test --help
        docker run --rm todo-cli:test add "Docker test task"
